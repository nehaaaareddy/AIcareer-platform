services:
  - type: web
    name: ai-career-platform-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://gandharr.github.io
      - key: MONGO_DB_NAME
        value: career_platform
      - key: POSTGRES_URL
        sync: false
      - key: MONGO_URL
        sync: false
