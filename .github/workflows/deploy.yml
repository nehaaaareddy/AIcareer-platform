name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Validate VITE_API_URL
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "Warning: VITE_API_URL secret is missing. Frontend will use production fallback URL from source code."
          elif [[ "$VITE_API_URL" == *"api.render.com"* ]] || [[ "$VITE_API_URL" == *"?key="* ]]; then
            echo "Warning: VITE_API_URL appears invalid (Render control API or contains key). Frontend will use production fallback URL from source code."
          fi

      - name: Build
        working-directory: frontend
        env:
          # Set in GitHub → Settings → Secrets → Actions → New repository secret
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Automatically sets the correct sub-path for GitHub Pages
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
